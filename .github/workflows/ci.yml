name: CI

# DiagramForge CI workflow.
#
# Runs on every push and every pull request targeting the default branch.
# The matrix covers Node 18 and Node 20 (the project's `engines.node` is
# `>=18`, and 20 is the current LTS). Every job runs on `ubuntu-latest`.
#
# The five required steps are:
#   1. `npm ci`            — clean install from package-lock.json
#   2. `npm run build`     — tsc → dist/
#   3. `npm run typecheck` — tsc --noEmit
#   4. `npm test`          — vitest run (pretest also runs build)
#   5. `npm audit --audit-level=high` — dependency vulnerability scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }} on ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-

      - name: Clean install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit (high severity and above)
        run: npm audit --audit-level=high
